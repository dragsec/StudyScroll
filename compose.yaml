services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: studyscroll
      POSTGRES_USER: studyscroll
      POSTGRES_PASSWORD: studyscroll_dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - studyscroll_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studyscroll -d studyscroll"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  studyscroll_postgres_data:
